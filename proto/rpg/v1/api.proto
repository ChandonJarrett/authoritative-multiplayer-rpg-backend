syntax = "proto3";

package rpg.v1;

option go_package = "github.com/ChandonJarrett/authoritative-multiplayer-rpg-backend/internal/protocol/rpg/v1;rpgv1";

// --- Auth ---

// AuthService handles registration and login. Session tokens issued here are passed as Bearer tokens on subsequent RPCs.
service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
}

message RegisterRequest {
  string email    = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message LoginResponse {
  // Opaque session token; include as "Authorization: Bearer <token>" on CharacterService and GameService RPCs.
  string session_token = 1;
}
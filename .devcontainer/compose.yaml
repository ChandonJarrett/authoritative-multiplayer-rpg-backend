services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - go-mod-cache:/home/vscode/go/pkg/mod
      - go-build-cache:/home/vscode/.cache/go-build
    env_file: 
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  go-mod-cache:
  go-build-cache:
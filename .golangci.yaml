version: "2"

run:
  timeout: 3m
  tests: true
  relative-path-mode: gomod
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Core correctness
    - errcheck # unchecked errors
    - govet # go vet checks (printf format, copylocks, etc.)
    - staticcheck # broad static analysis (SA*, S*, ST*, QF*)
    - unused # unused code

    # Additional correctness
    - ineffassign # assignments overwritten before use
    - nilerr # return nil where err should propagate
    - predeclared # shadowing of built-in identifiers (new, len, etc.)
    - unconvert # unnecessary type conversions
    - durationcheck # suspicious duration multiplications

    # Security
    - gosec # security issues (SQL injection, weak crypto, etc.)

    # Error handling
    - errorlint # error wrapping and type assertion patterns

    # Style and maintainability
    - revive # opinionated Go style rules
    - gocritic # code smells and simplification hints
    - goconst # repeated string literals that could be constants
    - misspell # common spelling mistakes in comments and strings
    - bodyclose # HTTP response bodies must be closed
    - noctx # http.Request usage without context

  settings:
    revive:
      rules:
        - name: unused-parameter
          disabled: true
        - name: exported
          arguments:
            # Allow stuttering in generated connect code and clarifying prefixes.
            - disableStutteringCheck

    goconst:
      min-len: 4
      min-occurrences: 3

    gocritic:
      enabled-checks:
        - badLock
        - equalFold
        - hexLiteral
        - indexAlloc
        - nilValReturn
        - stringXbytes
        - typeAssertChain
        - unlabelStmt
        - unnecessaryBlock
        - weakCond

  exclusions:
    generated: lax
    rules:
      # errcheck is noisy in tests where failures cause t.Fatal anyway
      - path: _test\.go
        linters:
          - errcheck

      # Generated protobuf and connect code — exclude all linters
      # (generated: lax auto-detects "Code generated by" headers, these paths are belt-and-suspenders)
      - path: \.pb\.go$
        linters:
          - all
      - path: \.connect\.go$
        linters:
          - all

formatters:
  enable:
    - gofmt # canonical formatting
    - gofumpt # stricter superset of gofmt (consistent blank lines, etc.)
    - goimports # import grouping and unused import removal

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      colors: true
      print-linter-name: true

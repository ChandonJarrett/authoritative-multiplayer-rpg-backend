version: v2

plugins:
  - local: protoc-gen-go
    out: internal/protocol
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: internal/protocol
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  
  - local: protoc-gen-connect-go
    out: internal/protocol
    opt:
      - paths=source_relative
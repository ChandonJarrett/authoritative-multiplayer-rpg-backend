name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OS dependencies
        run: sudo bash scripts/install-apt-deps.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install Go tools
        run: make tools

      - name: Run quality checks
        run: make tidy-check fmt-check proto-lint proto-check vet lint vuln

      - name: Check for breaking proto changes
        run: make proto-breaking

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rpg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rpg"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:8.8.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Prepare env file
        run: cp .env.example .env

      - name: Install OS dependencies
        run: sudo bash scripts/install-apt-deps.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install Go tools
        run: make tools

      - name: Run database migrations
        run: make migrate-up

      - name: Run tests with race detector
        run: make test-race APP_ENV=testing
